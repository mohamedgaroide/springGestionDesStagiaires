<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Manager - Gestion des Stagiaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

<div class="container main-container">
    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold text-primary">RH Manager</h1>
        <p class="text-muted">Liste des Stagiaires (Connecté au Backend)</p>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Ajouter un nouveau stagiaire</h5>
        </div>
        <div>
        </div>
        <div class="card-body">
            <form id="stagiaireForm">                
                <section id="message" class="hidden">
                </section>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nom</label>
                        <input type="text" id="nom" class="form-control" placeholder="Ex: Bennani" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Prénom</label>
                        <input type="text" id="prenom" class="form-control" placeholder="Ex: Karim" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-plus"></i> + Ajouter Stagiaire
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
<div class="modal fade" id="updateModal" tabindex="-1" aria-labelledby="updateModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="updateModalLabel">Modifier le Stagiaire</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="updateForm">
                    <input type="hidden" id="modalId">
                    
                    <div class="mb-3">
                        <label class="form-label" >Nom</label>
                        <input type="text" id="modalNom" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" id="modalPrenom" class="form-control" required>
                    </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                <button type="submit" class="btn btn-primary" >Enregistrer</button>
            </div>
            </form>
        </div>
    </div>
</div>
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nom Complet</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
